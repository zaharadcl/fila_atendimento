<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema de Fila de Atendimento</title>
<style>
body { font-family: Arial; margin: 0; background: #f4f4f4; }
header { background: #2c3e50; color: white; padding: 15px; text-align: center; }
.container { padding: 20px; }
.card { background: white; padding: 15px; margin: 10px 0; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
button { padding: 10px; border: none; border-radius: 5px; cursor: pointer; }
.primary { background: #3498db; color: white; }
.success { background: #2ecc71; color: white; }
</style>
</head>
<body>

<header>
<h1>Sistema de Atendimento</h1>
</header>

<div class="container">

<!-- LOGIN -->
<div class="card">
<h2>Login</h2>
<input type="text" placeholder="Usuário"><br><br>
<input type="password" placeholder="Senha"><br><br>
<button class="primary">Entrar</button>
</div>

<!-- TELA PRINCIPAL -->
<div class="card">
<h2>Painel Principal</h2>
<p>Bem-vindo ao sistema!</p>
<button class="primary">Gerenciar Pessoas</button>
<button class="primary">Atendimentos</button>
</div>

<!-- GERENCIAMENTO DE PESSOAS -->
<div class="card">
<h2>Cadastro de Pessoas</h2>
<input type="text" placeholder="Nome"><br><br>
<input type="text" placeholder="CPF"><br><br>
<input type="date"><br><br>
<button class="success">Salvar</button>
</div>

<!-- ATENDIMENTOS -->
<div class="card">
<h2>Atendimentos</h2>
<p>Paciente: João</p>
<p>Status: Aguardando</p>
<button class="primary">Chamar Próximo</button>
</div>

<!-- GAMIFICAÇÃO -->
<div class="card">
<h2>Pontuação do Atendente</h2>
<p>Pontos: 120</p>
<button class="success">Resgatar Folga</button>
</div>

</div>

</body>
</html>
